<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DOMINUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; }

        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a0a, #1a1a1a); }
        .login-box { background: #1a1a1a; border: 2px solid #d4af37; border-radius: 8px; padding: 3rem; width: 100%; max-width: 400px; }
        .login-box h1 { color: #d4af37; text-align: center; margin-bottom: 2rem; font-size: 2rem; }
        .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #0a0a0a; border: 1px solid #d4af37; border-radius: 4px; color: #fff; font-size: 1rem; }
        .login-box input:focus { outline: none; border-color: white; }
        .login-box button { width: 100%; padding: 0.8rem; background: #d4af37; color: #0a0a0a; border: none; border-radius: 4px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .login-box button:hover { background: white; }
        .msg { text-align: center; margin-bottom: 1rem; font-size: 0.9rem; min-height: 20px; }
        .msg.error { color: #ff6b6b; }
        .credenciais { text-align: center; margin-top: 1rem; color: #999; font-size: 0.8rem; line-height: 1.6; }

        .admin-screen { display: none; }
        .admin-header { background: #1a1a1a; padding: 1.5rem 2rem; border-bottom: 2px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { color: #d4af37; }
        .logout { background: #ff6b6b; color: #fff; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .logout:hover { background: #ff5252; }

        .admin-content { max-width: 1200px; margin: 2rem auto; padding: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #d4af37; }
        .tab-btn { background: transparent; color: #999; border: none; padding: 1rem 2rem; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; font-size: 1rem; }
        .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-box { background: #1a1a1a; border: 2px solid #d4af37; border-radius: 8px; padding: 2rem; }
        .form-box h2 { color: #d4af37; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; background: #0a0a0a; border: 1px solid #d4af37; border-radius: 4px; color: #fff; font-family: 'Poppins'; font-size: 1rem; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: white; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group button { width: 100%; padding: 0.8rem; background: #d4af37; color: #0a0a0a; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .form-group button:hover { background: white; }

        .carros-list { background: #1a1a1a; border: 2px solid #d4af37; border-radius: 8px; padding: 2rem; }
        .carros-list h2 { color: #d4af37; margin-bottom: 1.5rem; }
        .carro-item { background: #0a0a0a; padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #d4af37; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .carro-info { flex: 1; min-width: 200px; }
        .carro-info p { margin: 0.3rem 0; color: #ddd; }
        .carro-info strong { color: #d4af37; }
        .carro-actions { display: flex; gap: 0.5rem; }
        .btn-delete { background: #ff6b6b; color: #fff; padding: 0.6rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-delete:hover { background: #ff5252; }
        .empty { text-align: center; color: #999; padding: 2rem; }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🔐 Login</h1>
        <div id="loginMsg" class="msg"></div>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button onclick="fazerLogin()">Entrar</button>
        <div class="credenciais">
            <strong>Credenciais padrão:</strong><br>
            Usuário: <code>admin</code><br>
            Senha: <code>1234</code>
        </div>
    </div>
</div>

<div class="admin-screen" id="adminScreen">
    <header class="admin-header">
        <h1>🏎️ DOMINUS - Admin</h1>
        <button class="logout" onclick="fazerLogout()">Sair</button>
    </header>

    <div class="admin-content">
        <div class="tabs">
            <button class="tab-btn active" onclick="abrirTab(event, 'carros')">📋 Meus Carros</button>
            <button class="tab-btn" onclick="abrirTab(event, 'adicionar')">➕ Adicionar Carro</button>
        </div>

        <div id="carros" class="tab-content active">
            <div class="carros-list">
                <h2>Carros Cadastrados</h2>
                <div id="carrosList" class="empty">Nenhum carro cadastrado</div>
            </div>
        </div>

        <div id="adicionar" class="tab-content">
            <div class="form-box">
                <h2>Adicionar Novo Carro</h2>
                <div class="form-group">
                    <label>Marca</label>
                    <input type="text" id="marca" placeholder="Ex: Toyota">
                </div>
                <div class="form-group">
                    <label>Modelo</label>
                    <input type="text" id="modelo" placeholder="Ex: Corolla">
                </div>
                <div class="form-group">
                    <label>Ano</label>
                    <input type="number" id="ano" placeholder="Ex: 2024">
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="preco" placeholder="Ex: 150000">
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="text" id="imagem" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <div class="form-group">
                    <button onclick="adicionarCarro()">✅ Adicionar Carro</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const USUARIO = 'admin';
const SENHA = '1234';

function fazerLogin() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const msg = document.getElementById('loginMsg');

    if (user === USUARIO && pass === SENHA) {
        localStorage.setItem('adminLogado', 'sim');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        carregarCarros();
    } else {
        msg.textContent = '❌ Usuário ou senha incorretos!';
        msg.className = 'msg error';
    }
}

function fazerLogout() {
    if (confirm('Tem certeza que deseja sair?')) {
        localStorage.removeItem('adminLogado');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminScreen').style.display = 'none';
        document.getElementById('user').value = '';
        document.getElementById('pass').value = '';
        document.getElementById('loginMsg').textContent = '';
    }
}

function abrirTab(event, tabName) {
    event.preventDefault();
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
}

function adicionarCarro() {
    const marca = document.getElementById('marca').value.trim();
    const modelo = document.getElementById('modelo').value.trim();
    const ano = document.getElementById('ano').value.trim();
    const preco = document.getElementById('preco').value.trim();
    const imagem = document.getElementById('imagem').value.trim();

    if (!marca || !modelo || !ano || !preco) {
        alert('❌ Preencha todos os campos obrigatórios!');
        return;
    }

    const carros = JSON.parse(localStorage.getItem('carros')) || [];
    carros.push({ 
        marca, 
        modelo, 
        ano, 
        preco, 
        imagem: imagem || 'https://via.placeholder.com/300x250?text=Sem+imagem'
    });
    localStorage.setItem('carros', JSON.stringify(carros));

    alert('✅ Carro adicionado com sucesso!');
    document.getElementById('marca').value = '';
    document.getElementById('modelo').value = '';
    document.getElementById('ano').value = '';
    document.getElementById('preco').value = '';
    document.getElementById('imagem').value = '';

    carregarCarros();
}

function deletarCarro(index) {
    if (confirm('Tem certeza que deseja deletar este carro?')) {
        const carros = JSON.parse(localStorage.getItem('carros')) || [];
        carros.splice(index, 1);
        localStorage.setItem('carros', JSON.stringify(carros));
        carregarCarros();
    }
}
