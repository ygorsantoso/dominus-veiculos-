<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DOMINUS VEÍCULOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; }

        /* LOGIN SCREEN */
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); }
        .login-box { background: #1a1a1a; padding: 3rem; border: 2px solid #d4af37; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(212,175,55,0.2); }
        .login-box h1 { text-align: center; color: #d4af37; margin-bottom: 2rem; font-size: 2rem; }
        .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #0a0a0a; border: 1px solid #d4af37; border-radius: 4px; color: #fff; font-size: 1rem; }
        .login-box input:focus { outline: none; border-color: #fff; }
        .login-box button { width: 100%; padding: 0.8rem; background: #d4af37; color: #0a0a0a; border: none; border-radius: 4px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .login-box button:hover { background: white; }
        .login-error { color: #ff6b6b; text-align: center; margin-bottom: 1rem; font-size: 0.9rem; display: none; }

        /* ADMIN PANEL */
        .admin-container { display: none; min-height: 100vh; background: #0a0a0a; }
        .admin-header { background: #1a1a1a; padding: 1.5rem 2rem; border-bottom: 2px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { color: #d4af37; font-size: 1.8rem; }
        .logout-btn { background: #ff6b6b; color: #fff; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .logout-btn:hover { background: #ff5252; }

        .admin-content { max-width: 1200px; margin: 2rem auto; padding: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #d4af37; }
        .tab-btn { background: transparent; color: #999; border: none; padding: 1rem 2rem; cursor: pointer; font-weight: 600; font-size: 1rem; transition: color 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; }
        .tab-btn:hover { color: #d4af37; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* FORM */
        .form-section { background: #1a1a1a; padding: 2rem; border: 2px solid #d4af37; border-radius: 8px; }
        .form-section h2 { color: #d4af37; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; background: #0a0a0a; border: 1px solid #d4af37; border-radius: 4px; color: #fff; font-size: 1rem; font-family: 'Poppins', sans-serif; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: white; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-group button { width: 100%; padding: 0.8rem; background: #d4af37; color: #0a0a0a; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; transition: background 0.3s; }
        .form-group button:hover { background: white; }

        /* CARROS LIST */
        .carros-list { background: #1a1a1a; border: 2px solid #d4af37; border-radius: 8px; padding: 2rem; }
        .carros-list h2 { color: #d4af37; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .carro-item { background: #0a0a0a; padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #d4af37; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .carro-info { flex: 1; min-width: 200px; }
        .carro-info p { margin: 0.3rem 0; color: #ddd; }
        .carro-info strong { color: #d4af37; }
        .carro-actions { display: flex; gap: 0.5rem; }
        .btn-edit, .btn-delete { padding: 0.6rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-edit { background: #4a90e2; color: #fff; }
        .btn-edit:hover { background: #357abd; }
        .btn-delete { background: #ff6b6b; color: #fff; }
        .btn-delete:hover { background: #ff5252; }

        .empty-message { text-align: center; color: #999; padding: 2rem; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 1rem; }
            .tabs { flex-direction: column; }
            .carro-item { flex-direction: column; align-items: flex-start; }
            .carro-actions { width: 100%; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-container" id="loginScreen">
    <div class="login-box">
        <h1>🔐 Login Admin</h1>
        <div class="login-error" id="loginError"></div>
        <input type="text" id="loginUser" placeholder="Usuário" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Senha" autocomplete="off">
        <button onclick="fazerLogin()">Entrar</button>
        <p style="text-align: center; margin-top: 1rem; color: #999; font-size: 0.9rem;">Padrão: admin / 1234</p>
    </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-container" id="adminPanel">
    <header class="admin-header">
        <h1>🏎️ DOMINUS - Painel Admin</h1>
        <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </header>

    <div class="admin-content">
        <div class="tabs">
            <button class="tab-btn active" onclick="abrirTab('gerenciar-carros')">Gerenciar Carros</button>
            <button class="tab-btn" onclick="abrirTab('adicionar-carro')">Adicionar Carro</button>
            <button class="tab-btn" onclick="abrirTab('editar-pagina')">Editar Página</button>
        </div>

        <!-- TAB 1: GERENCIAR CARROS -->
        <div id="gerenciar-carros" class="tab-content active">
            <div class="carros-list">
                <h2>Carros Cadastrados</h2>
                <div id="carrosListContainer">
                    <div class="empty-message">Nenhum carro cadastrado ainda</div>
                </div>
            </div>
        </div>

        <!-- TAB 2: ADICIONAR CARRO -->
        <div id="adicionar-carro" class="tab-content">
            <div
