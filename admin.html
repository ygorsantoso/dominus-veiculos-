<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DOMINUS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #1a1a1a; border: 2px solid #d4af37; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        .login-box h1 { color: #d4af37; text-align: center; margin-bottom: 30px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #d4af37; color: #fff; border-radius: 4px; }
        .login-box button { width: 100%; padding: 12px; background: #d4af37; color: #0a0a0a; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 10px; }
        .login-box button:hover { background: #fff; }
        .msg { color: #ff6b6b; text-align: center; margin-bottom: 15px; }
        .link { text-align: center; color: #d4af37; cursor: pointer; text-decoration: underline; }
        .admin-container { display: none; }
        .admin-header { background: #1a1a1a; padding: 20px; border-bottom: 2px solid #d4af37; display: flex; justify-content: space-between; }
        .admin-header h1 { color: #d4af37; }
        .logout-btn { background: #ff6b6b; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
        .admin-content { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .tabs { margin-bottom: 20px; }
        .tabs button { padding: 12px 20px; background: #d4af37; border: none; margin-right: 10px; cursor: pointer; font-weight: bold; }
        .form-box, .carros-list { background: #1a1a1a; border: 2px solid #d4af37; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .form-box h2, .carros-list h2 { color: #d4af37; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { color: #d4af37; display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #d4af37; color: #fff; }
        .carro-item { background: #0a0a0a; padding: 15px; margin-bottom: 10px; border-left: 4px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ff6b6b; color: #fff; padding: 8px 15px; border: none; cursor: pointer; }
        .empty { text-align: center; color: #999; padding: 30px; }
        .aba { display: none; }
        .aba.ativo { display: block; }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="login-box">
        <h1>🔐 Login</h1>
        <div id="loginMsg" class="msg"></div>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button type="button" onclick="login()">Entrar</button>
        <div class="link" onclick="alert('Entre em contato: admin@dominus.com')">Esqueci minha senha</div>
    </div>
</div>

<div class="admin-container" id="adminContainer">
    <header class="admin-header">
        <h1>🏎️ DOMINUS - Admin</h1>
        <button class="logout-btn" type="button" onclick="logout()">Sair</button>
    </header>
    <div class="admin-content">
        <div class="tabs">
            <button type="button" onclick="aba('carros')">📋 Meus Carros</button>
            <button type="button" onclick="aba('add')">➕ Adicionar</button>
        </div>
        <div id="carros" class="aba ativo">
            <div class="carros-list">
                <h2>Meus Carros</h2>
                <div id="lista" class="empty">Nenhum carro</div>
            </div>
        </div>
        <div id="add" class="aba">
            <div class="form-box">
                <h2>Novo Carro</h2>
                <div class="form-group"><label>Marca</label><input type="text" id="marca"></div>
                <div class="form-group"><label>Modelo</label><input type="text" id="modelo"></div>
                <div class="form-group"><label>Ano</label><input type="number" id="ano"></div>
                <div class="form-group"><label>Preço</label><input type="number" id="preco"></div>
                <div class="form-group"><label>Imagem URL</label><input type="text" id="imagem"></div>
                <div class="form-group"><button type="button" onclick="addcar()">✅ Adicionar</button></div>
            </div>
        </div>
    </div>
</div>

<script>
let ok = false;
let cars = [];

function login() {
    if (document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
        ok = true;
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'block';
    } else {
        document.getElementById('loginMsg').textContent = '❌ Dados incorretos';
    }
}

function logout() {
    if (confirm('Sair?')) {
        ok = false;
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('adminContainer').style.display = 'none';
        document.getElementById('user').value = '';
        document.getElementById('pass').value = '';
        document.getElementById('loginMsg').textContent = '';
    }
}

function aba(n) {
    document.querySelectorAll('.aba').forEach(x => x.classList.remove('ativo'));
    document.getElementById(n).classList.add('ativo');
}

function addcar() {
    const m = document.getElementById('marca').value;
    const mo = document.getElementById('modelo').value;
    const a = document.getElementById('ano').value;
    const p = document.getElementById('preco').value;
    if (!m || !mo || !a || !p) { alert('Preencha tudo'); return; }
    cars.push({marca: m, modelo: mo, ano: a, preco: p});
    document.getElementById('marca').value = '';
    document.getElementById('modelo').value = '';
    document.getElementById('ano').value = '';
    document.getElementById('preco').value = '';
    document.getElementById('imagem').value = '';
    listar();
}

function deletar(i) {
    cars.splice(i, 1);
    listar();
}

function listar() {
    const l = document.getElementById('lista');
    if (cars.length === 0) {
        l.innerHTML = '<div class="empty">Nenhum carro</div>';
        return;
    }
    l.innerHTML = cars.map((c, i) => `<div class="carro-item"><div><p><strong>${c.marca} ${c.modelo}</strong></p><p>📅 ${c.ano} | 💰 R$ ${c.preco}</p></div><button class="btn-delete" onclick="deletar(${i})">🗑️</button></div>`).join('');
}
</script>

</body>
</html>
